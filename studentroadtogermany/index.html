<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Road to Germany — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0e11;
            --gold: #c9a96e;
            --text: #e8e4dc;
            --muted: rgba(232, 228, 220, 0.45);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px;
        }

        .tag {
            font-size: 0.68rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 24px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        h1 em {
            font-style: italic;
            color: var(--gold);
        }

        p {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.75;
            max-width: 480px;
            margin-bottom: 40px;
        }

        a {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            text-decoration: none;
            border-bottom: 1px solid rgba(201, 169, 110, 0.3);
            padding-bottom: 3px;
            transition: border-color 0.2s;
        }

        a:hover {
            border-color: var(--gold);
        }
    </style>
</head>

<body>
    <div class="tag">In Development</div>
    <h1>Student Road<br>to <em>Germany</em></h1>
    <p>Consultation services for students from Myanmar navigating the German university process — course selection,
        blocked accounts, and full-service packages. Coming soon.</p>
    <a href="../">← Back to Portfolio</a>
</body>

</html>
