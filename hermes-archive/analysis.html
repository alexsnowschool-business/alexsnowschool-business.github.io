<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Hermès Archive — Resale Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#f0e9de; --bg-card:#faf5ec; --nav-bg:#17110a;
  --gold:#b8923a; --gold-lt:#eedcad;
  --text:#1e150a; --text-mid:#6b5640; --text-mute:#a8937a;
  --border:#cfc0a5;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Jost',sans-serif; font-weight:300; background:var(--bg); color:var(--text); }
nav {
  background:var(--nav-bg); height:60px; position:sticky; top:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 2rem; border-bottom:2px solid var(--gold);
}
.nav-brand {
  font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:300; font-style:italic;
  letter-spacing:.06em; color:var(--gold); text-transform:uppercase;
}
.nav-brand span { color:#e8dcc8; font-weight:400; font-size:14px; margin-left:12px; letter-spacing:.02em; }
.nav-links { display:flex; gap:4px; }
.nav-links a {
  color:#9c8a75; text-decoration:none; font-size:12px; font-weight:500;
  padding:6px 14px; border-radius:4px; letter-spacing:.08em; text-transform:uppercase; transition:all .15s;
}
.nav-links a:hover { color:#e8dcc8; }
.nav-links a.active { color:var(--gold); border-bottom:2px solid var(--gold); border-radius:0; }
.page { max-width:1200px; margin:0 auto; padding:2rem; }
.section-label {
  font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; font-style:italic;
  letter-spacing:.02em; color:var(--text); margin:3rem 0 1.25rem;
  padding-bottom:.6rem; border-bottom:1px solid var(--border);
  display:flex; align-items:baseline; gap:.75rem;
}
.section-num { font-size:10px; letter-spacing:.14em; color:var(--text-mute); text-transform:uppercase; font-family:'Jost',sans-serif; font-weight:600; }
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(175px,1fr)); gap:14px; margin-bottom:2rem; }
.kpi { background:var(--bg-card); border:1px solid var(--border); padding:1.2rem; }
.kpi .label { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:.12em; color:var(--text-mute); }
.kpi .value { font-family:'Cormorant Garamond',serif; font-size:2.2rem; font-weight:300; line-height:1; margin-top:4px; }
.kpi .sub { font-size:11px; color:var(--text-mid); margin-top:5px; }
.obs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; margin-bottom:2rem; }
.obs-card { background:var(--bg-card); border:1px solid var(--border); padding:1.4rem; border-left:3px solid var(--gold); }
.obs-num { font-size:9px; font-weight:700; color:var(--gold); letter-spacing:.14em; text-transform:uppercase; margin-bottom:6px; }
.obs-title { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:300; font-style:italic; margin-bottom:8px; }
.obs-stat { font-size:12px; font-weight:600; background:var(--bg); padding:6px 10px; margin-bottom:8px; border-left:2px solid var(--gold); color:var(--text); }
.obs-note { font-size:12px; color:var(--text-mid); line-height:1.6; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:2rem; }
.grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-bottom:2rem; }
.card { background:var(--bg-card); border:1px solid var(--border); padding:1.5rem; }
.card-title { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:300; font-style:italic; margin:0 0 3px; }
.card-sub { font-size:10px; color:var(--text-mute); margin:0 0 1rem; letter-spacing:.06em; text-transform:uppercase; }
.chart-wrap { position:relative; height:280px; }
.chart-wrap-tall { position:relative; height:360px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); font-size:9px; text-transform:uppercase; letter-spacing:.1em; color:var(--text-mute); font-weight:500; }
td { padding:9px 10px; border-bottom:1px solid #e8dfd0; color:var(--text); }
tr:last-child td { border-bottom:none; }
tbody tr:hover { background:#ece5d8; }
.loading-msg { text-align:center; padding:5rem 2rem; font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--text-mute); letter-spacing:.06em; }
@media(max-width:700px) {
  .grid2,.grid3,.obs-grid { grid-template-columns:1fr; }
  .page { padding:1rem; }
  nav { padding:0 1rem; height:52px; }
  .nav-brand { font-size:15px; }
  .nav-brand span { display:none; }
  .nav-links a { font-size:11px; padding:6px 8px; }
  .kpi-grid { grid-template-columns:repeat(2,1fr); }
  .chart-wrap { height:220px; }
  .chart-wrap-tall { height:260px; }
  table { display:block; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .section-label { font-size:18px; margin-top:2rem; }
}
</style>
</head>
<body>
<nav>
  <span class="nav-brand">The Hermès Archive <span>— Resale Analysis</span></span>
  <div class="nav-links">
    <a href="./index.html">Catalogue</a>
    <a href="./analysis.html" class="active">Analysis</a>
    <a href="../hermes-research/">Research</a>
    <a href="../" style="margin-left:8px;border-left:1px solid #2e2218;padding-left:14px">← Portfolio</a>
  </div>
</nav>

<div class="page" id="page-content">
  <div class="loading-msg" id="loading-msg">Loading analysis…</div>
</div>

<script>
Chart.defaults.font.family = "'Jost', sans-serif";
Chart.defaults.color = '#a8937a';
Chart.defaults.borderColor = '#cfc0a5';

const GOLD_COLOR  = 'rgba(184,146,58,0.75)';
const GOLD_BORDER = 'rgb(184,146,58)';
const SLATE_COLOR  = 'rgba(107,86,64,0.55)';
const SLATE_BORDER = 'rgb(107,86,64)';

function fmt(v) { return v != null ? '€' + v.toLocaleString() : '—'; }
function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function pctBar(pct) {
  const w = Math.round(pct * 1.2), e = Math.round((100-pct)*1.2);
  return `<span style="display:inline-flex;align-items:center;gap:5px">
    <span style="display:inline-block;height:5px;width:${w}px;background:#b8923a;opacity:.75"></span>
    <span style="display:inline-block;height:5px;width:${e}px;background:#cfc0a5"></span>
    <span style="font-size:10px;color:#6b5640">${pct}%</span>
  </span>`;
}

async function init() {
  const d = await fetch('./analysis.json').then(r => r.json());
  document.getElementById('loading-msg').remove();

  const ps = d.price_stats;
  const topBrand = d.brand_rows[0] || {};
  const topPlatform = d.platform_rows[0] || {};
  const topCountry = d.top_countries[0] || {};

  const descCovPct = d.total_items ? Math.round(d.total_with_metadata * 100 / d.total_items) : 0;

  const observations = [
    { num:'01', title:'Where Supply Concentrates',
      stat:`${topBrand.brand || '—'} leads with ${(topBrand.count||0).toLocaleString()} listings`,
      note:`The secondary market for heritage leather reflects the same cultural hierarchy as the primary — the most storied houses dominate resale volume.` },
    { num:'02', title:'The Price Floor of Provenance',
      stat:`Market median: ${fmt(ps.median)} · range ${fmt(ps.min)}–${fmt(ps.max)}`,
      note:`The entry price for heritage resale is far above the mass-luxury tier. The floor itself signals a different buyer category.` },
    { num:'03', title:'Geography of the Secondary Market',
      stat:`${topCountry.country || '—'} is the dominant seller origin`,
      note:`European seller concentration reflects proximity to the original retail channel — pieces enter the resale market closest to where they were purchased.` },
    { num:'04', title:'The Platform Premium',
      stat:`${topPlatform.platform || '—'} — ${(topPlatform.count||0).toLocaleString()} listings · median ${fmt(topPlatform.median)}`,
      note:`Curated resale platforms command higher asking prices and provide the provenance signal that defines the discerning buyer. Curation is priced in.` },
  ];

  const obsCards = observations.map(o => `
    <div class="obs-card">
      <div class="obs-num">No. ${o.num}</div>
      <div class="obs-title">${o.title}</div>
      <div class="obs-stat">${o.stat}</div>
      <div class="obs-note">${o.note}</div>
    </div>`).join('');

  const brandTableRows = d.brand_rows.map(r => `
    <tr>
      <td><strong>${esc(r.brand)}</strong></td>
      <td style="text-align:right">${r.count.toLocaleString()}</td>
      <td style="text-align:right">${fmt(r.median)}</td>
      <td style="text-align:right">${fmt(r.mean)}</td>
      <td style="text-align:right;color:var(--text-mute);font-size:11px">${fmt(r.min)} – ${fmt(r.max)}</td>
    </tr>`).join('');

  const modelTableRows = d.model_rows.map(r => `
    <tr>
      <td><strong>${esc(r.model)}</strong></td>
      <td style="text-align:right">${r.count.toLocaleString()}</td>
      <td style="text-align:right">${fmt(r.median)}</td>
      <td style="text-align:right">${fmt(r.mean)}</td>
    </tr>`).join('');

  const platformRows = d.platform_rows.map(r => `
    <tr>
      <td>${esc(r.platform)}</td>
      <td style="text-align:right">${r.count.toLocaleString()}</td>
      <td style="text-align:right">${fmt(r.median)}</td>
      <td style="text-align:right">${fmt(r.mean)}</td>
    </tr>`).join('');

  const countryRows = d.top_countries.map(r => `
    <tr>
      <td>${esc(r.country)}</td>
      <td style="text-align:right;font-weight:600">${r.count.toLocaleString()}</td>
    </tr>`).join('');

  const colorRows = (d.top_colors||[]).map(r => `
    <tr>
      <td>${esc(r.color)}</td>
      <td style="text-align:right;font-weight:600">${r.count.toLocaleString()}</td>
    </tr>`).join('');

  const coverageHeader = ['description','condition','color','listed_at','model','country']
    .map(f => `<th>${f}</th>`).join('');
  const coverageRows = (d.coverage_rows||[]).map(r => `
    <tr>
      <td><strong>${esc(r.platform)}</strong></td>
      <td style="color:#6b7280">${r.total.toLocaleString()}</td>
      ${['description','condition','color','listed_at','model','country']
        .map(f => `<td style="font-size:11px;white-space:nowrap">${pctBar((r.fields[f]||{pct:0}).pct)}</td>`)
        .join('')}
    </tr>`).join('');

  document.getElementById('page-content').innerHTML = `
  <div class="section-label"><span class="section-num">I</span> Supply Overview</div>
  <div class="kpi-grid">
    <div class="kpi"><div class="label">Total Listings</div><div class="value">${d.total_items.toLocaleString()}</div><div class="sub">${d.total_images.toLocaleString()} images indexed</div></div>
    <div class="kpi"><div class="label">Median Resale Price</div><div class="value" style="color:var(--gold)">${fmt(ps.median)}</div><div class="sub">${ps.count.toLocaleString()} priced listings</div></div>
    <div class="kpi"><div class="label">Mean Resale Price</div><div class="value">${fmt(ps.mean)}</div><div class="sub">range ${fmt(ps.min)} – ${fmt(ps.max)}</div></div>
    <div class="kpi"><div class="label">Brands Covered</div><div class="value">${d.brand_rows.length}</div><div class="sub">${d.platform_rows.length} source platforms</div></div>
    <div class="kpi"><div class="label">Top Brand</div><div class="value" style="font-size:1.5rem">${esc(topBrand.brand||'—')}</div><div class="sub">${(topBrand.count||0).toLocaleString()} listings · median ${fmt(topBrand.median)}</div></div>
    <div class="kpi"><div class="label">Metadata Coverage</div><div class="value">${descCovPct}%</div><div class="sub">items with at least one metadata field</div></div>
  </div>

  <div class="section-label"><span class="section-num">II</span> Market Observations</div>
  <div class="obs-grid">${obsCards}</div>

  <div class="section-label"><span class="section-num">III</span> Price Distribution</div>
  <div class="grid2">
    <div class="card"><div class="card-title">Price Band Distribution</div><div class="card-sub">All listings — broad view</div><div class="chart-wrap"><canvas id="bandChart"></canvas></div></div>
    <div class="card"><div class="card-title">Median Price by Brand</div><div class="card-sub">Where each house sits on the resale spectrum</div><div class="chart-wrap"><canvas id="brandPriceChart"></canvas></div></div>
  </div>
  <div class="card" style="margin-bottom:2rem">
    <div class="card-title">Fine Price Distribution</div>
    <div class="card-sub">€2,000 bins — reveals resale price clustering</div>
    <div class="chart-wrap"><canvas id="fineChart"></canvas></div>
  </div>

  <div class="section-label"><span class="section-num">IV</span> Supply by Brand</div>
  <div class="card" style="margin-bottom:2rem">
    <div class="card-title">Brand Breakdown</div>
    <div class="card-sub">Listing volume and pricing by house</div>
    <table>
      <thead><tr><th>Brand</th><th style="text-align:right">Listings</th><th style="text-align:right">Median</th><th style="text-align:right">Mean</th><th style="text-align:right">Range</th></tr></thead>
      <tbody>${brandTableRows}</tbody>
    </table>
  </div>
  <div class="card" style="margin-bottom:2rem">
    <div class="card-title">Listings by Brand</div>
    <div class="card-sub">Volume comparison across houses</div>
    <div class="chart-wrap"><canvas id="brandVolChart"></canvas></div>
  </div>

  <div class="section-label"><span class="section-num">V</span> Model Analysis</div>
  <div class="card" style="margin-bottom:2rem">
    <div class="card-title">Top Models by Volume</div>
    <div class="card-sub">Minimum 2 listings — Hermès models identified by bag type</div>
    <table>
      <thead><tr><th>Model</th><th style="text-align:right">Listings</th><th style="text-align:right">Median</th><th style="text-align:right">Mean</th></tr></thead>
      <tbody>${modelTableRows||'<tr><td colspan="4" style="color:var(--text-mute);font-style:italic">No model data yet.</td></tr>'}</tbody>
    </table>
  </div>

  <div class="section-label"><span class="section-num">VI</span> Source &amp; Geography</div>
  <div class="grid2" style="margin-bottom:2rem">
    <div class="card">
      <div class="card-title">By Platform</div>
      <div class="card-sub">Authenticated resale sources</div>
      <table><thead><tr><th>Platform</th><th style="text-align:right">Listings</th><th style="text-align:right">Median</th><th style="text-align:right">Mean</th></tr></thead><tbody>${platformRows}</tbody></table>
    </div>
    <div class="card">
      <div class="card-title">Seller Country</div>
      <div class="card-sub">Geographic origin of listings</div>
      <table><thead><tr><th>Country</th><th style="text-align:right">Listings</th></tr></thead><tbody>${countryRows||'<tr><td colspan="2" style="color:var(--text-mute);font-style:italic">No country data yet.</td></tr>'}</tbody></table>
    </div>
  </div>
  <div class="grid2" style="margin-bottom:2rem">
    <div class="card">
      <div class="card-title">Colour Supply</div>
      <div class="card-sub">Most-listed colours across all brands</div>
      <table><thead><tr><th>Colour</th><th style="text-align:right">Listings</th></tr></thead><tbody>${colorRows||'<tr><td colspan="2" style="color:var(--text-mute);font-style:italic">No colour data yet.</td></tr>'}</tbody></table>
    </div>
    <div class="card">
      <div class="card-title">Listing Timeline</div>
      <div class="card-sub">Monthly listing volume</div>
      ${d.timeline.labels.length ? '<div class="chart-wrap"><canvas id="timelineChart"></canvas></div>' : '<p style="font-size:12px;color:var(--text-mute);padding-top:1rem;font-style:italic">No listed_at data yet.</p>'}
    </div>
  </div>

  <div class="section-label"><span class="section-num">VII</span> Data Coverage</div>
  <div class="card" style="margin-bottom:3rem">
    <div class="card-title">Field Coverage by Source <span style="font-family:\'Jost\',sans-serif;font-size:12px;font-weight:400;color:var(--text-mute);margin-left:8px">${d.total_with_metadata.toLocaleString()} / ${d.total_items.toLocaleString()} items (${descCovPct}%)</span></div>
    <div class="card-sub" style="margin-bottom:1rem">Proportion of items with each metadata field populated</div>
    <div style="overflow-x:auto">
      <table style="font-size:12px"><thead><tr><th>Platform</th><th>Items</th>${coverageHeader}</tr></thead><tbody>${coverageRows}</tbody></table>
    </div>
    <p style="margin-top:1rem;font-size:11px;color:var(--text-mute);font-style:italic">
      Description length (authenticated items): median ${d.desc_stats.median.toLocaleString()} chars · mean ${d.desc_stats.mean.toLocaleString()} chars across ${d.desc_stats.count.toLocaleString()} listings.
    </p>
  </div>`;

  // Charts
  new Chart(document.getElementById('bandChart'), {
    type:'bar',
    data:{ labels:d.band_labels, datasets:[{label:'Listings', data:d.price_bands, backgroundColor:GOLD_COLOR, borderColor:GOLD_BORDER, borderWidth:1}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxRotation:45,font:{size:10}}},y:{beginAtZero:true,title:{display:true,text:'Listings'}}}}
  });

  new Chart(document.getElementById('brandPriceChart'), {
    type:'bar',
    data:{ labels:d.brand_rows.map(r=>r.brand), datasets:[{label:'Median price (€)', data:d.brand_rows.map(r=>r.median), backgroundColor:GOLD_COLOR, borderColor:GOLD_BORDER, borderWidth:1}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,title:{display:true,text:'Median Price (€)'}}}}
  });

  new Chart(document.getElementById('fineChart'), {
    type:'bar',
    data:{ labels:d.fine_labels, datasets:[{label:'Listings', data:d.fine_bands, backgroundColor:GOLD_COLOR, borderColor:GOLD_BORDER, borderWidth:1}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxRotation:45,font:{size:10}}},y:{beginAtZero:true,title:{display:true,text:'Listings'}}}}
  });

  new Chart(document.getElementById('brandVolChart'), {
    type:'bar',
    data:{ labels:d.brand_rows.map(r=>r.brand), datasets:[{label:'Listings', data:d.brand_rows.map(r=>r.count), backgroundColor:SLATE_COLOR, borderColor:SLATE_BORDER, borderWidth:1}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,title:{display:true,text:'Listings'}}}}
  });

  if (d.timeline.labels.length && document.getElementById('timelineChart')) {
    new Chart(document.getElementById('timelineChart'), {
      type:'line',
      data:{ labels:d.timeline.labels, datasets:[{label:'Listings', data:d.timeline.counts, borderColor:GOLD_BORDER, backgroundColor:'rgba(184,146,58,0.1)', tension:.3, fill:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxRotation:45,font:{size:10}}},y:{beginAtZero:true,title:{display:true,text:'Listings'}}}}
    });
  }
}

init();
</script>
</body>
</html>
