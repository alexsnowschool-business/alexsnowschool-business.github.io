name: Beat the Estimate — The Hammer Price

# Recurring multi-lot Substack roundup, distinct from the single-lot deep
# dive generated by weekly-reel.yml / substack-post.yml. Runs after the
# twice-weekly art scrape (scrape-art.yml, Mon+Thu 02:00 UTC) has landed,
# so "recent" lots (by scraped_at) reflect the latest data.
on:
  schedule:
    - cron: '0 6 * * 2,5'   # 06:00 UTC Tue + Fri — a few hours after each scrape
  workflow_dispatch:
    inputs:
      top_n:
        description: "Number of lots to feature"
        required: false
        default: "6"
      days:
        description: "Lookback window in days (by scraped_at) — ignored if start_date is set"
        required: false
        default: "7"
      start_date:
        description: "Explicit 'YYYY-MM-DD' cutoff — only lots scraped on or after this date are eligible. Overrides days."
        required: false
        default: ""

jobs:
  beat-the-estimate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx python-dotenv pillow

      - name: Generate Beat the Estimate draft + cards
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:   ${{ secrets.OPENROUTER_MODEL }}
        run: |
          python -u scripts/beat_the_estimate.py --run \
            --top-n "${{ inputs.top_n || '6' }}" \
            --days "${{ inputs.days || '7' }}" \
            --start-date "${{ inputs.start_date }}"

      - name: Find cards folder
        id: cards
        run: |
          LABEL="$(date -u '+%Y-%m-%d')"
          if [ -n "${{ inputs.start_date }}" ]; then
            LABEL="${LABEL}-from-${{ inputs.start_date }}"
          fi
          FOLDER="output/beat_the_estimate/${LABEL}"
          echo "folder=$FOLDER" >> "$GITHUB_OUTPUT"
          echo "Cards folder: $FOLDER"

      - name: Commit draft and DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/substack/ data/art.db
          git diff --cached --quiet || git commit -m "feat(substack): beat-the-estimate roundup $(date -u '+%Y-%m-%d') [skip ci]"
          git pull --rebase --autostash origin main
          git push

      - name: Post cards to Buffer
        if: hashFiles(format('{0}/meta.json', steps.cards.outputs.folder)) != ''
        env:
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:    ${{ secrets.OPENROUTER_MODEL }}
          BUFFER_TOKEN:        ${{ secrets.BUFFER_TOKEN }}
          BUFFER_INSTAGRAM_ID: ${{ secrets.BUFFER_INSTAGRAM_ID }}
          BUFFER_TIKTOK_ID:    ${{ secrets.BUFFER_TIKTOK_ID }}
          GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
        run: python -u scripts/post_beat_the_estimate_to_buffer.py "${{ steps.cards.outputs.folder }}"
