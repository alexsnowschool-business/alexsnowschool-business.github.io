name: Weekly Art Scrape

on:
  schedule:
    - cron: '0 2 * * 1'   # 02:00 UTC every Monday
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape-art:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit scraped data back
      actions: write        # needed to trigger static.yml via gh workflow run

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python + uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync
        env:
          UV_INDEX_URL: https://pypi.org/simple/

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps
        env:
          UV_INDEX_URL: https://pypi.org/simple/

      - name: Run Christie's scraper
        run: uv run python -m scraper.christies --max-lots 50
        env:
          UV_INDEX_URL: https://pypi.org/simple/
          PYTHONPATH: .

      - name: Run Sotheby's scraper
        run: uv run python -m scraper.sothebys --max-lots 50
        env:
          UV_INDEX_URL: https://pypi.org/simple/
          PYTHONPATH: .

      - name: Run Artprice futures scraper
        run: uv run python -m scraper.artprice --max-lots 200
        env:
          UV_INDEX_URL: https://pypi.org/simple/
          PYTHONPATH: .

      - name: Rebuild art catalogue and analysis JSON
        run: uv run python scripts/build_art_json.py
        env:
          UV_INDEX_URL: https://pypi.org/simple/
          PYTHONPATH: .

      - name: Rebuild art research JSON
        run: uv run python scripts/build_research_json.py
        env:
          UV_INDEX_URL: https://pypi.org/simple/
          PYTHONPATH: .

      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/art.db art-archive/catalogue.json art-archive/analysis.json art-research/research.json
          if git diff --cached --quiet; then
            echo "No new art data — nothing to commit."
            exit 0
          fi
          TOTAL=$(uv run python -c "
          from scraper.art_db import connect, all_lots
          conn = connect()
          print(len(all_lots(conn)))
          conn.close()
          " 2>/dev/null)
          git commit -m "chore(data): weekly art scrape $(date -u '+%Y-%m-%d') (${TOTAL} total lots)"
          git pull --rebase --autostash origin main
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deployment
        if: steps.commit.outputs.pushed == 'true'
        run: gh workflow run static.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
