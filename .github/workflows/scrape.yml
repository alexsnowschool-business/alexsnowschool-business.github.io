name: Daily eBay Scrape

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit scraped data back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python + uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync
        env:
          UV_INDEX_URL: https://pypi.org/simple/

      - name: Get eBay token
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          EBAY_APP_TOKEN_STORED: ${{ secrets.EBAY_APP_TOKEN }}
        run: |
          TOKEN=""

          # Try OAuth2 auto-refresh first (needs EBAY_APP_ID + EBAY_CERT_ID secrets)
          if [ -n "$EBAY_APP_ID" ] && [ -n "$EBAY_CERT_ID" ]; then
            RESPONSE=$(curl -s -X POST "https://api.ebay.com/identity/v1/oauth2/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -u "$EBAY_APP_ID:$EBAY_CERT_ID" \
              -d "grant_type=client_credentials&scope=https%3A%2F%2Fapi.ebay.com%2Foauth%2Fapi_scope")
            TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['token_type']+' '+d['access_token'])" 2>/dev/null || echo "")
            if [ -n "$TOKEN" ]; then
              echo "Token auto-refreshed via OAuth2."
            else
              echo "OAuth2 refresh failed (response: $RESPONSE) — falling back to stored token."
            fi
          else
            echo "EBAY_APP_ID or EBAY_CERT_ID not set — skipping OAuth2 refresh."
          fi

          # Fall back to manually stored token
          if [ -z "$TOKEN" ]; then
            TOKEN="$EBAY_APP_TOKEN_STORED"
            if [ -z "$TOKEN" ]; then
              echo "No eBay token available. Add EBAY_APP_TOKEN or EBAY_APP_ID+EBAY_CERT_ID to repo secrets."
              exit 1
            fi
            echo "Using stored EBAY_APP_TOKEN secret."
          fi

          echo "EBAY_APP_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Run eBay scraper
        run: uv run python -m scraper.ebay --max-products 150
        env:
          UV_INDEX_URL: https://pypi.org/simple/

      - name: Rebuild catalogue.json and analysis.json
        run: uv run python scripts/build_json.py
        env:
          UV_INDEX_URL: https://pypi.org/simple/

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ebay/metadata/ hermes-archive/catalogue.json hermes-archive/analysis.json
          if git diff --cached --quiet; then
            echo "No new data — nothing to commit."
          else
            COUNT=$(git diff --cached --name-only data/ebay/metadata/ | wc -l | tr -d ' ')
            git fetch origin main
            git rebase origin/main
            git commit -m "chore(data): daily eBay scrape $(date -u '+%Y-%m-%d') (+${COUNT} items)"
            git push
          fi
