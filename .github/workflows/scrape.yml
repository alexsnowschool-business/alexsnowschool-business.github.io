name: Daily Scrape

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit scraped data back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python + uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync
        env:
          UV_INDEX_URL: https://pypi.org/simple/

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Install Playwright browser
        run: uv run playwright install chromium
        env:
          UV_INDEX_URL: https://pypi.org/simple/

      - name: Run eBay scraper
        run: uv run python -m scraper.ebay --max-products 150
        env:
          UV_INDEX_URL: https://pypi.org/simple/
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}

      - name: Run Vinted scraper
        run: uv run python -m scraper.vinted --max-products 150
        env:
          UV_INDEX_URL: https://pypi.org/simple/

      - name: Run Vestiaire scraper
        run: uv run python -m scraper.vestiaire --max-products 150
        env:
          UV_INDEX_URL: https://pypi.org/simple/

      - name: Rebuild catalogue.json and analysis.json
        run: uv run python scripts/build_json.py
        env:
          UV_INDEX_URL: https://pypi.org/simple/

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ebay/metadata/ data/vinted/metadata/ data/vestiaire/metadata/ hermes-archive/catalogue.json hermes-archive/analysis.json
          if git diff --cached --quiet; then
            echo "No new data — nothing to commit."
            exit 0
          fi
          EBAY_COUNT=$(git diff --cached --name-only data/ebay/metadata/ | wc -l | tr -d ' ')
          VINTED_COUNT=$(git diff --cached --name-only data/vinted/metadata/ | wc -l | tr -d ' ')
          VESTIAIRE_COUNT=$(git diff --cached --name-only data/vestiaire/metadata/ | wc -l | tr -d ' ')
          git commit -m "chore(data): daily scrape $(date -u '+%Y-%m-%d') (ebay +${EBAY_COUNT}, vinted +${VINTED_COUNT}, vestiaire +${VESTIAIRE_COUNT})"
          git pull --rebase origin main
          git push
