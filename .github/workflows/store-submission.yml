name: Store Contact Form Submission

# Triggered by the contact form via GitHub's repository_dispatch API.
# Regular git pushes skip this workflow entirely.
on:
  repository_dispatch:
    types: [contact-form]

permissions:
  contents: write

jobs:
  store:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append submission to CSV
        env:
          FORM_NAME:         ${{ github.event.client_payload.name }}
          FORM_EMAIL:        ${{ github.event.client_payload.email }}
          FORM_WHO:          ${{ github.event.client_payload.who }}
          FORM_PACKAGE:      ${{ github.event.client_payload.package }}
          FORM_MESSAGE:      ${{ github.event.client_payload.message }}
          FORM_SUBMITTED_AT: ${{ github.event.client_payload.submitted_at }}
        run: python3 studentroadtogermany/store_submission.py

      - name: Commit and push
        run: |
          git config user.email "submissions@studentroadtogermany"
          git config user.name "Submission Bot"
          git add studentroadtogermany/submissions.csv
          git diff --staged --quiet && echo "Nothing to commit." && exit 0
          git commit -m "chore(submissions): record contact form entry"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Retry ${attempt}/3..."
            sleep $((attempt * 2))
          done
