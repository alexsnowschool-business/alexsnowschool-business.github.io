name: Quote Scrape

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC every day
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  scrape-quotes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python + uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync
        env:
          UV_INDEX_URL: https://pypi.org/simple/

      - name: Run Goodreads quote scraper
        run: |
          uv run python scripts/goodreads_scraper.py \
            --tags books reading life wisdom love inspirational \
                   philosophy writing poetry art music travel \
                   friendship happiness success truth courage \
                   change time creativity imagination beauty \
                   freedom hope knowledge mindfulness nature \
                   patience solitude \
            --pages 2
        env:
          PYTHONPATH: .

      - name: Report quote count
        run: |
          uv run python -c "
          import sqlite3
          conn = sqlite3.connect('data/quotes.db')
          total  = conn.execute('SELECT COUNT(*) FROM quotes').fetchone()[0]
          unused = conn.execute('SELECT COUNT(*) FROM quotes WHERE used_at IS NULL').fetchone()[0]
          print(f'Total quotes: {total}  |  Unused: {unused}')
          conn.close()
          "

      - name: Commit and push quotes.db
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/quotes.db
          if git diff --cached --quiet; then
            echo "No new quotes — nothing to commit."
            exit 0
          fi
          TOTAL=$(uv run python -c "
          import sqlite3; conn = sqlite3.connect('data/quotes.db')
          print(conn.execute('SELECT COUNT(*) FROM quotes').fetchone()[0])
          ")
          git commit -m "chore(data): quote scrape $(date -u '+%Y-%m-%d') (${TOTAL} total quotes) [skip ci]"
          git pull --rebase --autostash origin main
          git push
