name: Quote Scrape

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC every day
  workflow_dispatch:
    inputs:
      account:
        description: "Account slug to scrape (leave blank = all accounts)"
        required: false
        default: "lifequoteshere"

jobs:
  scrape-quotes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python + uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync
        env:
          UV_INDEX_URL: https://pypi.org/simple/

      - name: Scrape quotes for all accounts
        env:
          PYTHONPATH: "scripts:."
        run: |
          ACCOUNTS="${{ inputs.account }}"
          if [ -z "$ACCOUNTS" ]; then
            ACCOUNTS="lifequoteshere"
          fi
          for ACCOUNT in $ACCOUNTS; do
            echo "=== Scraping: $ACCOUNT ==="
            uv run python scraper/goodreads_scraper.py --account "$ACCOUNT" --pages 2
          done

      - name: Report quote counts
        continue-on-error: true
        env:
          PYTHONPATH: "scripts:."
        run: |
          ACCOUNTS="${{ inputs.account }}"
          if [ -z "$ACCOUNTS" ]; then
            ACCOUNTS="lifequoteshere"
          fi
          for ACCOUNT in $ACCOUNTS; do
            uv run python -c "
          import sqlite3, sys; sys.path.insert(0,'scripts')
          import account_config
          cfg = account_config.load('$ACCOUNT')
          db  = cfg.get('quotes_db', 'data/quotes.db')
          try:
              conn   = sqlite3.connect(db)
              total  = conn.execute('SELECT COUNT(*) FROM quotes').fetchone()[0]
              unused = conn.execute('SELECT COUNT(*) FROM quotes WHERE used_at IS NULL').fetchone()[0]
              print(f'  $ACCOUNT: {total} total, {unused} unused')
          except Exception:
              print(f'  $ACCOUNT: (no db yet)')
          "
          done

      - name: Commit and push quote databases
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*_quotes.db data/quotes.db 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new quotes — nothing to commit."
            exit 0
          fi
          git commit -m "chore(data): quote scrape $(date -u '+%Y-%m-%d') [skip ci]"
          git pull --rebase --autostash origin main
          git push
