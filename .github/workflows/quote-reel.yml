name: Quote Reel

on:
  schedule:
    - cron: '0 1  * * *'   # 01:00 UTC — 08:00 BKK
    - cron: '0 5  * * *'   # 05:00 UTC — 12:00 BKK
    - cron: '0 9  * * *'   # 09:00 UTC — 16:00 BKK
    - cron: '0 13 * * *'   # 13:00 UTC — 20:00 BKK
    - cron: '0 17 * * *'   # 17:00 UTC — 00:00 BKK
  workflow_dispatch:
    inputs:
      account:
        description: "Account slug (matches accounts/<slug>.yaml)"
        required: false
        default: "lifequoteshere"
      quote_id:
        description: "Specific quote ID to use (leave blank for auto)"
        required: false
        default: ""
      schedule_at:
        description: "Schedule post ISO 8601, e.g. 2026-07-14T19:00:00+07:00 (blank = add to queue)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — render reel but do not post to Buffer"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  quote-reel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python + uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync
        env:
          UV_INDEX_URL: https://pypi.org/simple/

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg --quiet

      - name: Generate quote reel
        id: reel
        env:
          PYTHONPATH: .
        run: |
          ACCOUNT="${{ inputs.account || 'lifequoteshere' }}"
          ARGS="--account $ACCOUNT"
          if [ -n "${{ inputs.quote_id }}" ]; then
            ARGS="$ARGS --id ${{ inputs.quote_id }}"
          fi
          uv run python scripts/quote_reel.py $ARGS

          FOLDER=$(ls -dt reels/quote-*/ 2>/dev/null | head -1 | sed 's|/$||')
          echo "folder=$FOLDER" >> $GITHUB_OUTPUT
          echo "Reel folder: $FOLDER"

      - name: Commit quotes.db (marks quote used)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/quotes.db
          git diff --cached --quiet || git commit -m "chore(data): mark quote used $(date -u '+%Y-%m-%d') [skip ci]"
          git pull --rebase --autostash origin main
          git push

      - name: Post to Buffer
        if: inputs.dry_run != 'true'
        env:
          PROVENANCE_BUFFER_TOKEN:        ${{ secrets.PROVENANCE_BUFFER_TOKEN }}
          PROVENANCE_BUFFER_TIKTOK_ID:    ${{ secrets.PROVENANCE_BUFFER_TIKTOK_ID }}
          PROVENANCE_BUFFER_INSTAGRAM_ID: ${{ secrets.PROVENANCE_BUFFER_INSTAGRAM_ID }}
          GH_TOKEN:                       ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: .
        run: |
          ACCOUNT="${{ inputs.account || 'lifequoteshere' }}"
          ARGS="${{ steps.reel.outputs.folder }} --account $ACCOUNT"
          if [ -n "${{ inputs.schedule_at }}" ]; then
            ARGS="$ARGS --schedule '${{ inputs.schedule_at }}'"
          fi
          eval uv run python scripts/post_quote_to_buffer.py $ARGS

      - name: Dry run — show captions only
        if: inputs.dry_run == 'true'
        env:
          PYTHONPATH: .
        run: |
          ACCOUNT="${{ inputs.account || 'lifequoteshere' }}"
          uv run python scripts/post_quote_to_buffer.py \
            ${{ steps.reel.outputs.folder }} --account $ACCOUNT --dry-run
