name: Weekly Reel — The Hammer Price

on:
  schedule:
    - cron: "0 11 * * 2"     # Tuesday   12:00 CET / 13:00 CEST
    - cron: "0 11 * * 3"     # Wednesday 12:00 CET / 13:00 CEST
    - cron: "0 11 * * 4"     # Thursday  12:00 CET / 13:00 CEST
    - cron: "0 11 * * 5"     # Friday    12:00 CET / 13:00 CEST
    - cron: "0 11 * * 6"     # Saturday  12:00 CET / 13:00 CEST
  workflow_dispatch:
    inputs:
      lot_index:
        description: "Lot index to use (0 = top lot, 1 = 2nd, etc.) — overrides week_number if set"
        required: false
        default: ""
      week_number:
        description: "ISO week number to simulate (e.g. 21) — combined with today's day-of-week"
        required: false
        default: ""
      artist:
        description: "Filter by artist name, e.g. 'Basquiat' (leave blank for auto)"
        required: false
        default: ""
      title:
        description: "Filter by painting title, e.g. 'Infinity Nets' (leave blank for auto)"
        required: false
        default: ""

jobs:
  reel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pillow httpx python-dotenv elevenlabs edge-tts

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk --quiet

      # Rotate lot index: Tue=0, Wed=1, Thu=2, Fri=3, Sat=4
      # Offset by week-of-year so we don't repeat the same 5 lots every week
      - name: Determine lot index
        id: lot
        run: |
          if [ -n "${{ inputs.lot_index }}" ]; then
            echo "index=${{ inputs.lot_index }}" >> $GITHUB_OUTPUT
          else
            DOW=$(date +%u)         # 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat
            WEEK=$(date +%V)        # ISO week number
            if [ -n "${{ inputs.week_number }}" ]; then
              WEEK="${{ inputs.week_number }}"
            fi
            DAY_OFFSET=$(( DOW - 2 ))
            INDEX=$(( (WEEK * 5 + DAY_OFFSET) % 10 ))
            echo "index=$INDEX" >> $GITHUB_OUTPUT
          fi

      - name: Generate reel
        env:
          PYTHONUNBUFFERED:      "1"
          OPENROUTER_API_KEY:    ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:      ${{ secrets.OPENROUTER_MODEL }}
          ELEVENLABS_API_KEY:    ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID:   ${{ secrets.ELEVENLABS_VOICE_ID }}
          ELEVENLABS_MODEL_ID:   ${{ secrets.ELEVENLABS_MODEL_ID }}
        run: |
          ARGS="--all-time --lot-index ${{ steps.lot.outputs.index }} --top-n 10 --run --voice"
          if [ -n "${{ inputs.artist }}" ]; then
            ARGS="$ARGS --artist '${{ inputs.artist }}'"
          fi
          if [ -n "${{ inputs.title }}" ]; then
            ARGS="$ARGS --title '${{ inputs.title }}'"
          fi
          eval python -u scripts/auto_reel.py $ARGS

      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/art.db
          git diff --cached --quiet || git commit -m "chore(db): mark posted lot in posted_reels [skip ci]"
          git push

      # Find the reel folder that was just created (most recently modified)
      - name: Find reel folder
        id: reel
        run: |
          FOLDER=$(ls -dt reels/*/ 2>/dev/null | head -1 | sed 's|/$||')
          echo "folder=$FOLDER" >> $GITHUB_OUTPUT
          echo "Reel folder: $FOLDER"

      - name: Post to Buffer
        env:
          BUFFER_TOKEN:        ${{ secrets.BUFFER_TOKEN }}
          BUFFER_INSTAGRAM_ID: ${{ secrets.BUFFER_INSTAGRAM_ID }}
          BUFFER_TIKTOK_ID:    ${{ secrets.BUFFER_TIKTOK_ID }}
          BUFFER_LINKEDIN_ID:  ${{ secrets.BUFFER_LINKEDIN_ID }}
          GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:    ${{ secrets.OPENROUTER_MODEL }}
        run: python scripts/post_to_buffer.py ${{ steps.reel.outputs.folder }}

      - name: Post to YouTube
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/post_to_youtube.py ${{ steps.reel.outputs.folder }}

      - name: Extract lot ID from reel config
        id: lot_id
        run: |
          LOT_ID=$(python -c "
          import re, sys
          text = open('${{ steps.reel.outputs.folder }}/reel_config.py').read()
          m = re.search(r'\"lot_id\"\s*:\s*\"([^\"]+)\"', text)
          print(m.group(1) if m else '')
          ")
          echo "value=$LOT_ID" >> $GITHUB_OUTPUT
          echo "Lot ID: $LOT_ID"

      - name: Generate Substack draft
        if: steps.lot_id.outputs.value != ''
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:   ${{ secrets.OPENROUTER_MODEL }}
        run: python -u scripts/substack_post.py --lot-id "${{ steps.lot_id.outputs.value }}"

      - name: Commit Substack draft
        if: steps.lot_id.outputs.value != ''
        run: |
          git add output/substack/
          git stash
          git pull --rebase
          git stash pop
          git diff --cached --quiet || git commit -m "feat(substack): draft post for lot ${{ steps.lot_id.outputs.value }} [skip ci]"
          git push
