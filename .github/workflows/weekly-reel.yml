name: Weekly Reel — The Hammer Price

on:
  schedule:
    # Morning slot — 4:00 UTC = 12:00 CET / 13:00 CEST
    - cron: "0 4 * * 0"
    - cron: "0 4 * * 1"
    - cron: "0 4 * * 2"
    - cron: "0 4 * * 3"
    - cron: "0 4 * * 4"
    - cron: "0 4 * * 5"
    - cron: "0 4 * * 6"
  
   
  workflow_dispatch:
    inputs:
      week_number:
        description: "ISO week number to simulate (e.g. 21) — combined with today's day-of-week"
        required: false
        default: ""
      artist:
        description: "Filter by artist name, e.g. 'Basquiat' (leave blank for auto)"
        required: false
        default: ""
      title:
        description: "Filter by painting title, e.g. 'Infinity Nets' (leave blank for auto)"
        required: false
        default: ""

jobs:
  reel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pillow httpx python-dotenv elevenlabs edge-tts pytumblr requests-oauthlib

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk --quiet

      # Campaign artist: manual input wins; otherwise today's rotation
      - name: Determine campaign artist
        id: campaign
        run: |
          if [ -n "${{ inputs.artist }}" ]; then
            echo "artist=${{ inputs.artist }}" >> $GITHUB_OUTPUT
          else
            CAMPAIGN=$(python scripts/campaign_artist.py 2>/dev/null || true)
            echo "artist=$CAMPAIGN" >> $GITHUB_OUTPUT
            if [ -n "$CAMPAIGN" ]; then
              echo "  ▸ Campaign artist: $CAMPAIGN"
            fi
          fi

      - name: Generate reel
        env:
          PYTHONUNBUFFERED:      "1"
          OPENROUTER_API_KEY:    ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:      ${{ secrets.OPENROUTER_MODEL }}
          ELEVENLABS_API_KEY:    ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID:   ${{ secrets.ELEVENLABS_VOICE_ID }}
          ELEVENLABS_MODEL_ID:   ${{ secrets.ELEVENLABS_MODEL_ID }}
        run: |
          ARGS="--all-time --top-n 20 --run --voice"
          if [ -n "${{ steps.campaign.outputs.artist }}" ]; then
            ARGS="$ARGS --artist '${{ steps.campaign.outputs.artist }}'"
          fi
          if [ -n "${{ inputs.title }}" ]; then
            ARGS="$ARGS --title '${{ inputs.title }}'"
          fi
          eval python -u scripts/art_reel.py $ARGS

      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/art.db
          git diff --cached --quiet || git commit -m "chore(db): mark posted lot in posted_reels [skip ci]"
          git push

      # Find the reel folder that was just created (most recently modified)
      - name: Find reel folder
        id: reel
        run: |
          FOLDER=$(ls -dt reels/*/ 2>/dev/null | head -1 | sed 's|/$||')
          echo "folder=$FOLDER" >> $GITHUB_OUTPUT
          echo "Reel folder: $FOLDER"

      - name: Post to Buffer
        env:
          BUFFER_TOKEN:        ${{ secrets.BUFFER_TOKEN }}
          BUFFER_INSTAGRAM_ID: ${{ secrets.BUFFER_INSTAGRAM_ID }}
          BUFFER_TIKTOK_ID:    ${{ secrets.BUFFER_TIKTOK_ID }}
          BUFFER_LINKEDIN_ID:  ${{ secrets.BUFFER_LINKEDIN_ID }}
          GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:    ${{ secrets.OPENROUTER_MODEL }}
        run: python scripts/post_to_buffer.py ${{ steps.reel.outputs.folder }}

      - name: Post to YouTube
        continue-on-error: true
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/post_to_youtube.py ${{ steps.reel.outputs.folder }}

      - name: Post to Tumblr
        continue-on-error: true
        env:
          TUMBLR_CONSUMER_KEY:    ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_OAUTH_TOKEN:     ${{ secrets.TUMBLR_OAUTH_TOKEN }}
          TUMBLR_OAUTH_SECRET:    ${{ secrets.TUMBLR_OAUTH_SECRET }}
          TUMBLR_BLOG_NAME:       ${{ secrets.TUMBLR_BLOG_NAME }}
        run: python scripts/post_to_tumblr.py ${{ steps.reel.outputs.folder }}

      - name: Extract lot ID from reel config
        id: lot_id
        run: |
          LOT_ID=$(python -c "
          import re, sys
          text = open('${{ steps.reel.outputs.folder }}/reel_config.py').read()
          m = re.search(r'\"lot_id\"\s*:\s*\"([^\"]+)\"', text)
          print(m.group(1) if m else '')
          ")
          echo "value=$LOT_ID" >> $GITHUB_OUTPUT
          echo "Lot ID: $LOT_ID"

      - name: Generate Substack draft
        if: steps.lot_id.outputs.value != ''
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:   ${{ secrets.OPENROUTER_MODEL }}
        run: python -u scripts/substack_post.py --lot-id "${{ steps.lot_id.outputs.value }}"

      - name: Commit Substack draft
        if: steps.lot_id.outputs.value != ''
        run: |
          git add output/substack/
          git stash
          git pull --rebase
          git stash pop
          git diff --cached --quiet || git commit -m "feat(substack): draft post for lot ${{ steps.lot_id.outputs.value }} [skip ci]"
          git push
